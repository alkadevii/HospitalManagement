<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-card {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .form-card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        label {
            font-size: 14px;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52,152,219,0.3);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button, .back-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
        }

        button {
            background: #3498db;
            color: white;
        }

        button:hover {
            background: #2980b9;
        }

        .back-btn {
            background: #95a5a6;
            color: white;
        }

        .back-btn:hover {
            background: #7f8c8d;
        }
    </style>
</head>

<body>

<div class="form-card">
    <h2>📅 Book Appointment</h2>

    <form method="POST">

        <!-- Patient -->
        <label>Select Patient</label>
        <select name="pid" required>
            <option value="">-- Select Patient --</option>
            {% for p in patients %}
                <option value="{{ p._id }}">
                    {{ p.name }} ({{ p.phone }})
                </option>
            {% endfor %}
        </select>

        <!-- Doctor -->
        <label>Select Doctor</label>
        <select name="did" required>
            <option value="">-- Select Doctor --</option>
            {% for d in doctors %}
                <option value="{{ d._id }}">
                    Dr. {{ d.name }} ({{ d.specialization }})
                </option>
            {% endfor %}
        </select>

        <!-- Date -->
        <label>Date</label>
        <input type="date" name="date" required>

        <!-- Time -->
        <label>Time</label>
        <input type="time" name="time" required>

        <div class="btn-group">
            <button type="submit">Book</button>
            <a href="/" class="back-btn">Home</a>
        </div>

    </form>
</div>

</body>
</html>
