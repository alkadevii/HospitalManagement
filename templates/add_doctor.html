<!doctype html>
<html>
  <head>
    <title>Add Doctor</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: #f4f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .form-card {
        background: white;
        padding: 30px 40px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      .form-card h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #2c3e50;
      }

      label {
        font-size: 14px;
        color: #555;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.3s;
      }

      input:focus,
      select:focus {
        border-color: #3498db;
        box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
      }

      .btn-group {
        display: flex;
        gap: 10px;
      }

      button,
      .back-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        transition: 0.3s;
      }

      button {
        background: #3498db;
        color: white;
      }

      button:hover {
        background: #2980b9;
      }

      .back-btn {
        background: #95a5a6;
        color: white;
      }

      .back-btn:hover {
        background: #7f8c8d;
      }
    </style>
  </head>

  <body>
    <div class="form-card">
      <h2>👨‍⚕️ Add Doctor</h2>

      <form method="POST">
        <label>Name</label>
        <input type="text" name="name" required />

        <label>Specialization</label>
        <select name="specialization" required>
          <option value="">-- Select Specialization --</option>
          <option value="Gastro">Gastro</option>
          <option value="Neuro">Neuro</option>
          <option value="Cardio">Cardiology</option>
          <option value="Ortho">Orthopedics</option>
          <option value="Pedia">Pediatrics</option>
          <option value="Derm">Dermatology</option>
        </select>

        <label>Phone</label>
        <input type="text" name="phone" required />

        <div class="btn-group">
          <button type="submit">Add</button>
          <a href="/" class="back-btn">Home</a>
        </div>
      </form>
    </div>
  </body>
</html>
